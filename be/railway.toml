[build]
builder = "nixpacks"

[build.nixpacks]
# Don't run post-autoload scripts during install
aptPkgs = ["nginx", "libmysqlclient-dev"]
cmds = [
  "mkdir -p /var/log/nginx && mkdir -p /var/cache/nginx",
  "composer install --no-scripts --optimize-autoloader --ignore-platform-reqs",
  "npm install",
  "npm run build",
  "mkdir -p storage/framework/{sessions,views,cache,testing} storage/logs bootstrap/cache",
  "chmod -R a+rw storage",
  "php artisan config:cache",
  "php artisan event:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]
releaseCmd = "php artisan migrate --force --quiet"
startCmd = "vendor/bin/heroku-php-apache2 public/"
